apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  APP_ENV: "development"
  PORT: "8000"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  DATABASE_URL: "mysql+pymysql://root:root@mysql:3306/miniblog"
---
apiVersion: v1
kind: Secret
metadata:
  name: api-secret
type: Opaque
stringData:
  JWT_SECRET_KEY: "dev-only-change-me-please-32bytes-long"
  OPENAI_API_KEY: "replace-with-real-openai-key"
  ELEVENSLAB_API_KEY: "replace-with-real-elevenlabs-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: { app: api }
spec:
  replicas: 1
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: miniblog-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: api-config }
            - secretRef:    { name: api-secret }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  type: NodePort
  selector: { app: api }
  ports:
    - name: http              # ← ServiceMonitor 通过这个名字引用
      port: 8000
      targetPort: 8000
      nodePort: 30080